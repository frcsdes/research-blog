<h1>{{title}}</h1>

{{#each publications}}
<h2>{{title}}</h2>
<p>{{authors}}</p>
<p>{{format date}}, {{journal}}</p>
<figure>
	<picture>
		<source srcset="./images/{{image}}.webp" type="image/webp"/>
		<img
			alt="{{title}}"
			width="{{imageSize.width}}"
			height="{{imageSize.height}}"
			src="./images/{{image}}.jpg"
		/>
	</picture>
	<figcaption>
		<ul>{{#each links}}<li>{{link url label}}</li>{{/each}}</ul>
	</figcaption>
</figure>
{{/each}}
